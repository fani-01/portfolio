<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis AI Assistant | Chinta Phanith Kumar</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Custom Style with Cache Buster -->
    <link rel="stylesheet" href="style.css?v=1.0.6" />
  </head>
  <body>
    <!-- Premium Glowing Background Blobs -->
    <div class="glowing-bg-cyan"></div>
    <div class="glowing-bg-purple"></div>

    <!-- Initialization Overlay (Required for Speech Autoplay Compliance) -->
    <div id="activation-overlay">
      <div class="overlay-card">
        <div class="overlay-glow"></div>
        <h2 class="overlay-title">JARVIS HOLOGRAPHIC ASSISTANT</h2>
        <p class="overlay-subtitle">System Version 1.0.4 - Secure Connection Established</p>
        <div class="boot-logo-container my-4">
          <div class="boot-ring-outer"></div>
          <div class="boot-ring-inner"></div>
          <div class="boot-dot"></div>
        </div>
        <p class="overlay-desc">Click below to initialize assistant neural networks and sound synthesizers.</p>
        <button id="activate-btn" class="btn-initialize">
          INITIALIZE JARVIS
        </button>
      </div>
    </div>

    <!-- Main Content Container -->
    <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100 py-4">
      
      <!-- Top Navigation bar -->
      <div class="w-100 max-w-600 mb-3 d-flex justify-content-between align-items-center">
        <a href="../../index.html" class="back-link">
          <i class="bi bi-arrow-left"></i> Back to Portfolio
        </a>
        <span class="system-time" id="system-time">00:00:00 PM</span>
      </div>

      <!-- Jarvis Glass Console Card -->
      <div class="jarvis-card glass-card w-100 max-w-600">
        
        <!-- Header -->
        <div class="jarvis-header d-flex justify-content-between align-items-center mb-4">
          <div class="d-flex align-items-center gap-2">
            <span class="status-dot"></span>
            <span class="system-status">JARVIS CORE ONLINE</span>
          </div>
          <div class="d-flex align-items-center gap-1 system-mono">
            <span class="text-muted">HOST:</span> LOCALHOST
          </div>
        </div>

        <!-- Center Assistant Holographic Ring and Particle Canvas -->
        <div class="d-flex justify-content-center align-items-center position-relative my-4" style="height: 300px;">
          <div id="fanisHood">
            <div class="square">
              <span></span>
              <span></span>
              <span></span>
              <!-- Particle canvas positioned perfectly inside the ring -->
              <canvas id="canvasOne" width="300" height="300"></canvas>
            </div>
          </div>
        </div>

        <!-- Assistant Title / Feedback Status text -->
        <h4 class="text-light text-center mb-3 text-uppercase tracking-wide system-mono" id="assistant-title">Core Systems Online</h4>

        <!-- SiriWave Visualizer (hidden by default, appears when speaking/listening) -->
        <div id="siri-wave-wrapper" class="mb-3">
          <p class="siri-message text-cyan text-center mb-1">Hello, I am Your Assistant</p>
          <div id="siri-container"></div>
        </div>

        <!-- Interactive Chat Log Bubble Container -->
        <div id="chat-log" class="chat-log-container mb-4">
          <!-- Conversation bubbles appear here -->
        </div>

        <!-- Input Console Box -->
        <div id="TextInput" class="d-flex align-items-center">
          <input
            type="text"
            id="chatbox"
            name="chatbox"
            placeholder="Ask Jarvis anything..."
            class="input-field"
            autocomplete="off"
          />
          <button id="MicBtn" class="action-btn" title="Voice Input">
            <i class="bi bi-mic"></i>
          </button>
          <button id="SendBtn" class="action-btn" style="display: none;" title="Send Message">
            <i class="bi bi-send"></i>
          </button>
          <button id="ChatBtn" class="action-btn" title="Toggle SiriWave">
            <i class="bi bi-chat-dots"></i>
          </button>
        </div>

      </div>
    </div>

    <!-- Scripts with Cache Busters (Ordered for clean initialization) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>
    <script src="eel.js?v=1.0.6"></script>
    <script src="script.js?v=1.0.6"></script>
    <script src="main.js?v=1.0.6"></script>
  </body>
</html>
