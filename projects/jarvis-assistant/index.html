<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AEGIS AI Assistant | Chinta Phanith Kumar</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Custom Style with Cache Buster -->
    <link rel="stylesheet" href="style.css?v=1.1.0" />
  </head>
  <body>
    <!-- Floating Back to Portfolio Arrow -->
    <a href="../../index.html" class="back-link">
      <i class="bi bi-arrow-left"></i> Back
    </a>

    <!-- Top Center Title Header -->
    <div class="aegis-header">
      <span class="aegis-title">AEGIS AI</span>
    </div>

    <!-- Initialization Overlay (Required for Speech Autoplay Compliance) -->
    <div id="activation-overlay">
      <div class="overlay-card">
        <div class="overlay-glow"></div>
        <h2 class="overlay-title">AEGIS SYSTEM CORE</h2>
        <p class="overlay-subtitle">System Version 1.0.4 - Secure Connection Established</p>
        <div class="boot-logo-container my-4">
          <div class="boot-ring-outer"></div>
          <div class="boot-ring-inner"></div>
          <div class="boot-dot"></div>
        </div>
        <p class="overlay-desc">Click below to initialize assistant neural networks and sound synthesizers.</p>
        <button id="activate-btn" class="btn-initialize">
          INITIALIZE AEGIS
        </button>
      </div>
    </div>

    <!-- Main Content Container -->
    <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100 py-4">
      
      <!-- Central Interface console -->
      <div class="jarvis-console w-100 d-flex flex-column align-items-center">

        <!-- Center Assistant Holographic concentric rings -->
        <div class="d-flex justify-content-center align-items-center position-relative my-4" style="height: 300px; width: 300px;">
          <div id="fanisHood">
            <div class="square">
              <span></span>
              <span></span>
              <!-- Particle canvas positioned perfectly inside the rings -->
              <canvas id="canvasOne" width="300" height="300"></canvas>
            </div>
          </div>
        </div>

        <!-- Assistant Title -->
        <h1 class="text-light text-center" id="assistant-title">Ask me Anything</h1>

        <!-- SiriWave Visualizer (hidden by default, appears when speaking/listening) -->
        <div id="siri-wave-wrapper" class="w-100 max-w-650 mb-3" style="display: none;">
          <p class="siri-message text-cyan text-center mb-1">Hello, I am Your Assistant</p>
          <div id="siri-container"></div>
        </div>

        <!-- Interactive Chat Log Bubble Container -->
        <div id="chat-log" class="chat-log-container mb-4">
          <!-- Conversation bubbles appear here -->
        </div>

        <!-- System Status Indicator Bar -->
        <div class="input-status-bar d-flex justify-content-end gap-3 mb-2">
          <span class="status-indicator">
            <span class="dot blue-dot"></span> System Active
          </span>
          <span class="status-indicator">
            <span class="dot cyan-dot"></span> Connected
          </span>
        </div>

        <!-- Input Console Box -->
        <div id="TextInput" class="d-flex align-items-center">
          <input
            type="text"
            id="chatbox"
            name="chatbox"
            placeholder="Type your message here..."
            class="input-field"
            autocomplete="off"
          />
          <button id="MicBtn" class="action-btn" title="Voice Input">
            <i class="bi bi-mic"></i>
          </button>
          <button id="SendBtn" class="action-btn" style="display: none;" title="Send Message">
            <i class="bi bi-send"></i>
          </button>
          <button id="ChatBtn" class="action-btn" title="Toggle SiriWave">
            <i class="bi bi-chat-dots"></i>
          </button>
        </div>

      </div>
    </div>

    <!-- Scripts with Cache Busters (Ordered for clean initialization) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>
    <script src="eel.js?v=1.1.0"></script>
    <script src="script.js?v=1.1.0"></script>
    <script src="main.js?v=1.1.0"></script>
  </body>
</html>
